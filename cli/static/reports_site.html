function updateModels(prefix){
  const prov = document.getElementById(prefix+'-prov').value;
  const models = MODELS[prov] || [];
  ['qm','dm'].forEach(id=>{
    const sel = document.getElementById(prefix+'-'+id);
    if(!sel) return;
    sel.innerHTML = models.map(m=>`<option value="${m}">${m}</option>`).join('');
    if(models.length) sel.value = models[0];
  });
}

function _getAnalysts(prefix){
  const boxes = document.querySelectorAll(`#${prefix}-analysts input[type=checkbox]`);
  return Array.from(boxes).filter(b=>b.checked).map(b=>b.value);
}

async function runJob(type, prefix){
  const logEl    = document.getElementById(prefix+'-log');
  const statusEl = document.getElementById(prefix+'-status');
  const btn      = document.querySelector(`#v-run [onclick="runJob('${type}','${prefix}')"]`);

  logEl.textContent = '';
  logEl.classList.add('active');
  statusEl.style.display = 'inline-flex';
  statusEl.className = 'job-status running';
  statusEl.textContent = '⟳ running';
  btn.disabled = true;

  // Build params
  let params = {};
  const g = id => { const el=document.getElementById(id); return el?el.value:''; };

  if(type === 'screen'){
    params = {
      tickers:     g('sc-tickers'),
      date:        g('sc-date'),
      depth:       g('sc-depth'),
      workers:     g('sc-workers'),
      budget:      g('sc-budget'),
      provider:    g('sc-prov'),
      quick_model: g('sc-qm'),
      deep_model:  g('sc-dm'),
      analysts:    _getAnalysts('sc'),
    };
  } else if(type === 'analyze'){
    params = {
      ticker:      g('an-ticker').toUpperCase(),
      date:        g('an-date'),
      depth:       g('an-depth'),
      provider:    g('an-prov'),
      quick_model: g('an-qm'),
      deep_model:  g('an-dm'),
      analysts:    _getAnalysts('an'),
    };
  } else if(type === 'calibrate'){
    params = { run_name: g('clb-run') };
  } else if(type === 'reflect'){
    params = {
      ticker:      g('rf-ticker').toUpperCase(),
      exit_date:   g('rf-date'),
      provider:    g('rf-prov'),
      quick_model: g('rf-qm'),
      deep_model:  g('rf-dm'),
    };
  } else if(type === 'improve'){
    params = {
      provider:    g('imp-prov'),
      deep_model:  g('imp-dm'),
      quick_model: g('imp-dm'),
    };
  } else if(type === 'allocate'){
    params = {
      run_name:    g('alc-run'),
      date:        g('alc-date'),
      budget:      g('alc-budget'),
      provider:    g('alc-prov'),
      deep_model:  g('alc-dm'),
      quick_model: g('alc-dm'),
    };
  }

  let jobId;
  try {
    const res = await fetch('/api/jobs', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({type, params}),
    });
    if(!res.ok) throw new Error(await res.text());
    ({job_id: jobId} = await res.json());
  } catch(e){
    logEl.textContent = 'Error starting job: ' + e.message;
    statusEl.className = 'job-status error';
    statusEl.textContent = '✕ error';
    btn.disabled = false;
    return;
  }

  _bnrShow(type,jobId);

  // Stream via WebSocket
  if(_activeWs) { try{_activeWs.close();}catch(e){} }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws/${jobId}`);
  _activeWs = ws;

  ws.onmessage = e => {
    if(e.data === '__DONE__'){
      _bnrHide(type);
      statusEl.className = 'job-status done';
      statusEl.textContent = '✓ done';
      btn.disabled = false;
      // Refresh screenings data in the background so it's ready when user navigates there
      if(type==='screen'||type==='analyze'||type==='allocate'){
        _screeningsRefreshing=false;
        fetch('/api/data').then(r=>r.ok?r.json():null).then(fresh=>{if(fresh)Object.assign(DATA,fresh);}).catch(()=>{});
      }
      return;
    }
    if(e.data === '__ERROR__'){
      _bnrHide(type);
      statusEl.className = 'job-status error';
      statusEl.textContent = '✕ error';
      btn.disabled = false;
      return;
    }
    logEl.textContent += e.data + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  };
  ws.onerror = () => {
    _bnrHide(type);
    statusEl.className = 'job-status error';
    statusEl.textContent = '✕ ws error';
    btn.disabled = false;
  };
}

// ── Calendar ──────────────────────────────────────────────────────────────────
let _runTab = 'jobs';

function setRunTab(tab) {
  _runTab = tab;
  ['jobs','calendar'].forEach(t => {
    const panel = document.getElementById('run-'+t+'-panel');
    const tabEl = document.getElementById('run-tab-'+t);
    if (panel) panel.style.display = t === tab ? '' : 'none';
    if (tabEl) tabEl.classList.toggle('active', t === tab);
  });
  if (tab === 'calendar') loadCalendar();
}

function fmtMCap(n) {
  if (!n) return '—';
  if (n >= 1e12) return '$'+(n/1e12).toFixed(1)+'T';
  if (n >= 1e9)  return '$'+(n/1e9).toFixed(1)+'B';
  if (n >= 1e6)  return '$'+(n/1e6).toFixed(0)+'M';
  return '$'+n.toLocaleString();
}

function fmtCalDay(s) {
  if (!s) return '—';
  try {
    const d = new Date(s+'T00:00:00');
    return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
  } catch(e) { return s; }
}

function _renderCalendarDays(calData) {
  const days = Object.keys(calData).sort().reverse();
  if (!days.length) return '<div class="empty"><span class="ei">📅</span>No calendar days yet — pick a trading day above and click "Fetch from NASDAQ".</div>';
  return days.map(d => {
    const day = calData[d];
    const entries = day.entries || [];
    const fetchedAt = day.fetched_at ? new Date(day.fetched_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const ahDate = day.ah_date || d;
    const pmDate = day.pm_date || '';
    const rows = entries.map(e => {
      const cbId = 'cal-cb-'+d+'-'+e.ticker;
      const sessColor = e.session==='AH'?'var(--accent)':e.session==='PM'?'var(--info)':'var(--dim)';
      return `<tr>
        <td style="width:32px;text-align:center"><input type="checkbox" id="${cbId}" data-calday="${d}" value="${esc(e.ticker)}" checked style="accent-color:var(--accent)"></td>
        <td><strong class="tm">${esc(e.ticker)}</strong></td>
        <td style="color:var(--dim);font-size:11.5px;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e.company)}</td>
        <td><span style="color:${sessColor};font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em">${esc(e.session)}</span></td>
        <td style="color:var(--dim);font-size:11.5px">${esc(e.time)}</td>
        <td style="color:var(--dim);font-family:var(--mono);font-size:11.5px">${fmtMCap(e.market_cap)}</td>
        <td style="color:var(--dim);font-family:var(--mono);font-size:11.5px">${e.eps_estimate!=null?String(e.eps_estimate):'—'}</td>
        <td style="text-align:center"><button class="cal-remove-btn" onclick="removeCalendarTicker('${d}','${esc(e.ticker)}')" title="Remove">✕</button></td>
      </tr>`;
    }).join('');
    const tableHtml = entries.length
      ? `<div style="overflow-x:auto"><table class="dt"><thead><tr>
          <th style="width:32px;text-align:center"><input type="checkbox" checked onclick="calSelectAll('${d}',this.checked)" title="Select all" style="accent-color:var(--accent)"></th>
          <th>Ticker</th><th>Company</th><th>Session</th><th>Time</th><th>Mkt Cap</th><th>EPS Est.</th><th></th>
        </tr></thead><tbody>${rows}</tbody></table></div>`
      : `<div style="padding:16px 18px;color:var(--muted);font-size:12px">No entries yet. Add tickers below or re-fetch from NASDAQ.</div>`;
    return `<div class="cal-day">
      <div class="cal-day-hd">
        <div style="flex:1">
          <div class="cal-day-title">${fmtCalDay(d)}</div>
          <div class="cal-day-sub">AH: ${fmtCalDay(ahDate)} &nbsp;·&nbsp; PM: ${fmtCalDay(pmDate)} &nbsp;·&nbsp; ${entries.length} companies &nbsp;·&nbsp; fetched ${fetchedAt}</div>
        </div>
        <button class="cal-screen-btn" onclick="screenCalendarDay('${d}')">Screen Selected ▶</button>
      </div>
      ${tableHtml}
      <div class="cal-add-row">
        <input type="text" id="cal-add-${d}" placeholder="Add tickers: AAPL, MSFT, …">
        <button class="ab" onclick="addCalendarTickers('${d}','cal-add-${d}')">Add</button>
      </div>
    </div>`;
  }).join('');
}

async function loadCalendar() {
  const listEl = document.getElementById('cal-days-list');
  if (!listEl) return;
  try {
    const res = await fetch('/api/calendar');
    if (!res.ok) throw new Error(await res.text());
    const calData = await res.json();
    listEl.innerHTML = _renderCalendarDays(calData);
  } catch(e) {
    if (listEl) listEl.innerHTML = `<div class="empty">${esc('Error: '+e.message)}</div>`;
  }
}

async function fetchCalendarDay(dateStr) {
  if (!dateStr) { alert('Please pick a trading day first.'); return; }
  const btn = document.getElementById('cal-fetch-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Fetching…'; }
  try {
    const res = await fetch('/api/calendar/fetch', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({date: dateStr}),
    });
    if (!res.ok) throw new Error(await res.text());
    await loadCalendar();
  } catch(e) {
    alert('Error fetching calendar: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Fetch from NASDAQ'; }
  }
}

async function addCalendarTickers(date, inputId) {
  const inp = document.getElementById(inputId);
  if (!inp || !inp.value.trim()) return;
  const val = inp.value;
  try {
    const res = await fetch('/api/calendar/add', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({date, tickers: val}),
    });
    if (!res.ok) throw new Error(await res.text());
    inp.value = '';
    await loadCalendar();
  } catch(e) {
    alert('Error adding tickers: ' + e.message);
  }
}

async function removeCalendarTicker(date, ticker) {
  try {
    const res = await fetch(`/api/calendar/${date}/${encodeURIComponent(ticker)}`, {method:'DELETE'});
    if (!res.ok) throw new Error(await res.text());
    await loadCalendar();
  } catch(e) {
    alert('Error removing ticker: ' + e.message);
  }
}

function calSelectAll(date, checked) {
  document.querySelectorAll(`input[data-calday="${date}"]`).forEach(cb => { cb.checked = checked; });
}

function screenCalendarDay(date) {
  const checked = Array.from(document.querySelectorAll(`input[data-calday="${date}"]:checked`)).map(cb => cb.value);
  if (!checked.length) { alert('No tickers selected.'); return; }
  setRunTab('jobs');
  const tickerInput = document.getElementById('sc-tickers');
  const dateInput   = document.getElementById('sc-date');
  if (tickerInput) tickerInput.value = checked.join(', ');
  if (dateInput)   dateInput.value   = date;
  if (tickerInput) setTimeout(() => tickerInput.scrollIntoView({behavior:'smooth', block:'center'}), 80);
}

// ── Screening-run dropdown (for Allocate card) ────────────────────────────────
async function loadScreeningRunsDropdown(){
  const sel = document.getElementById('alc-run');
  if(!sel) return;
  try {
    const runs = await fetch('/api/screening-runs').then(r=>r.json()).catch(()=>[]);
    if(!runs.length){ sel.innerHTML='<option value="">No screening runs found</option>'; return; }
    sel.innerHTML = runs.map(r=>`<option value="${esc(r.name)}">${esc(r.name)} (${r.tickers} tickers${r.has_allocation?' · allocated':''})</option>`).join('');
  } catch(e){ sel.innerHTML='<option value="">Error loading runs</option>'; }
}

// ── Weights editor ─────────────────────────────────────────────────────────────
async function loadWeights(){
  try {
    const w = await fetch('/api/weights').then(r=>r.json());
    ['beat','guidance','setup','fundamentals'].forEach(k=>{
      const el=document.getElementById('wt-'+k); if(el) el.value=w[k]??'';
    });
  } catch(e){}
}
async function saveWeights(){
  const g=k=>parseFloat(document.getElementById('wt-'+k)?.value)||0;
  const btn=document.getElementById('wt-save');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try {
    await fetch('/api/weights',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({beat:g('beat'),guidance:g('guidance'),setup:g('setup'),fundamentals:g('fundamentals')})});
    if(btn){btn.textContent='✓ Saved';setTimeout(()=>{btn.disabled=false;btn.textContent='Save Weights';},1800);}
  } catch(e){
    if(btn){btn.disabled=false;btn.textContent='Save Weights';}
    alert('Error saving: '+e.message);
  }
}

// ── Performance / Stats view ───────────────────────────────────────────────────
async function renderPerformance(){
  $('v-performance').innerHTML=`<div class="ph"><h2>Performance</h2><p>Loading stats…</p></div>`;
  let stats={trades:{},calibration:{}}, weights={beat:0.7,guidance:1.0,setup:1.0,fundamentals:1.5};
  try { stats   = await fetch('/api/stats').then(r=>r.json()); } catch(e){}
  try { weights = await fetch('/api/weights').then(r=>r.json()); } catch(e){}

  const t=stats.trades||{}, cal=stats.calibration||{};
  const wr  = t.win_rate   !=null ? t.win_rate.toFixed(0)+'%'   : '—';
  const pnl = t.total_pnl  !=null ? cur(t.total_pnl)            : '—';
  const avg = t.avg_pnl    !=null ? cur(t.avg_pnl)              : '—';
  const cnt = t.count      !=null ? String(t.count)             : '—';
  const sa  = cal.signal_accuracy!=null ? cal.signal_accuracy.toFixed(0)+'%' : '—';
  const ba  = t.beat_accuracy!=null ? t.beat_accuracy.toFixed(0)+'%' : '—';
  const ga  = t.guidance_accuracy!=null ? t.guidance_accuracy.toFixed(0)+'%' : '—';

  function statCard(label,value,sub='',col=''){
    return`<div class="stat"><div class="stat-label">${label}</div><div class="stat-value${col?' '+col:''}">${value}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`;
  }

  // By-direction rows
  const dirRows = Object.entries(t.by_direction||{}).map(([dir,d])=>{
    const dr = d.count?((d.wins/d.count)*100).toFixed(0)+'%':'—';
    const cl = dir==='BUY'?'c-win':'c-loss';
    return`<tr><td><span class="badge ${dir==='BUY'?'b-buy':'b-short'}">${dir}</span></td><td class="num">${d.count}</td><td class="num ${cl}">${dr}</td></tr>`;
  }).join('');

  // Confidence accuracy rows
  const confRows = Object.entries(cal.by_confidence||{}).map(([c,d])=>
    `<tr><td>${esc(c)}</td><td class="num">${d.n}</td><td class="num ${d.accuracy>=50?'c-win':'c-loss'}">${d.accuracy.toFixed(0)}%</td></tr>`
  ).join('');

  $('v-performance').innerHTML=`
<div class="ph"><h2>Performance</h2><p>${t.count?t.count+' trades logged':'No trades yet'} · ${cal.screening_runs?cal.screening_runs+' screening runs calibrated':'no calibrations yet'}</p></div>

<div class="stat-grid">
  ${statCard('Win Rate', wr, t.count?(t.wins||0)+' W / '+(t.losses||0)+' L':''  , t.win_rate>=50?'c-win':t.win_rate!=null?'c-loss':'')}
  ${statCard('Total P&L', pnl, t.count?'across '+t.count+' trades':'' , t.total_pnl>0?'c-win':t.total_pnl<0?'c-loss':'')}
  ${statCard('Signal Accuracy', sa, cal.with_signal?(cal.with_signal||0)+' screened tickers':'')}
  ${statCard('Avg P&L / Trade', avg, '', t.avg_pnl>0?'c-win':t.avg_pnl<0?'c-loss':'')}
</div>

<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:28px">
  ${t.by_direction&&Object.keys(t.by_direction).length?`<div class="tw"><table class="dt"><thead><tr><th>Direction</th><th class="tr">Trades</th><th class="tr">Win %</th></tr></thead><tbody>${dirRows}</tbody></table></div>`:''}
  <div class="tw"><table class="dt"><thead><tr><th>Metric</th><th class="tr">Accuracy</th></tr></thead><tbody>
    <tr><td>Beat prediction</td><td class="num">${ba}</td></tr>
    <tr><td>Guidance prediction</td><td class="num">${ga}</td></tr>
  </tbody></table></div>
  ${confRows?`<div class="tw"><table class="dt"><thead><tr><th>Confidence</th><th class="tr">Signals</th><th class="tr">Accuracy</th></tr></thead><tbody>${confRows}</tbody></table></div>`:''}
</div>

<div class="section">
  <div class="sec-hd"><div class="sec-title">Allocation Weights</div></div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px">
    <p style="font-size:11.5px;color:var(--dim);margin-bottom:16px">
      <code>weighted_score = beat_w × beat_score + guidance_w × guidance_score + setup_w × setup_score + fundamentals_w × fundamentals_score</code>
    </p>
    <div class="form-row-3" style="margin-bottom:16px">
      <div><label>Fundamentals weight</label><input type="number" id="wt-fundamentals" value="${weights.fundamentals}" step="0.1" min="0"></div>
      <div><label>Guidance weight</label><input type="number" id="wt-guidance" value="${weights.guidance}" step="0.1" min="0"></div>
      <div><label>Setup weight</label><input type="number" id="wt-setup" value="${weights.setup}" step="0.1" min="0"></div>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <div style="flex:0 0 160px"><label>Beat weight</label><input type="number" id="wt-beat" value="${weights.beat}" step="0.1" min="0"></div>
      <div style="flex:1"></div>
      <button class="btn-run" id="wt-save" onclick="saveWeights()">Save Weights</button>
      <button class="dp-btn" onclick="fetch('/api/weights',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({beat:0.7,guidance:1.0,setup:1.0,fundamentals:1.5})}).then(()=>renderPerformance())" style="font-size:11px">Reset to defaults</button>
    </div>
  </div>
</div>`;
}

// ── Activity banner ────────────────────────────────────────────────────────────
let _bnrDismissed=false;
let _bnrActiveJobs=new Map(); // type -> jobId
const _bnrLabels={screen:'Screening',analyze:'Analysis',calibrate:'Calibration',reflect:'Reflection',improve:'Improvement',allocate:'Allocation'};
let _bnrLogWs=null;

function hideBanner(){_bnrDismissed=true;$('run-banner').classList.remove('visible');}

function _bnrShow(type,jobId){
  _bnrDismissed=false;
  _bnrActiveJobs.set(type,jobId||null);
  _bnrUpdate();
}
function _bnrHide(type){
  _bnrActiveJobs.delete(type);
  _bnrUpdate();
}
function _bnrUpdate(){
  const banner=$('run-banner');
  if(!_bnrDismissed&&_bnrActiveJobs.size>0){
    const names=[..._bnrActiveJobs.keys()].map(t=>_bnrLabels[t]||t);
    $('bnr-text').textContent=names.join(', ')+' running — tap to view log';
    banner.classList.add('visible');
  } else if(_bnrActiveJobs.size===0){
    banner.classList.remove('visible');
  }
}

function openBannerLog(){
  const entries=[..._bnrActiveJobs.entries()];
  if(!entries.length) return;
  const [type,jobId]=entries[0];
  if(!jobId) return;
  const logEl=$('bnr-log-pre');
  $('bnr-log-title').textContent=(_bnrLabels[type]||type)+' Log';
  $('bnr-log-status').className='job-status running';
  $('bnr-log-status').textContent='running';
  logEl.textContent='';
  $('bnr-log-modal').classList.add('open');
  if(_bnrLogWs){try{_bnrLogWs.close();}catch(e){}}
  const proto=location.protocol==='https:'?'wss:':'ws:';
  const ws=new WebSocket(`${proto}//${location.host}/ws/${jobId}`);
  _bnrLogWs=ws;
  ws.onmessage=e=>{
    if(e.data==='__DONE__'){$('bnr-log-status').className='job-status done';$('bnr-log-status').textContent='done';return;}
    if(e.data==='__ERROR__'){$('bnr-log-status').className='job-status error';$('bnr-log-status').textContent='error';return;}
    logEl.textContent+=e.data+'\n';
    logEl.scrollTop=logEl.scrollHeight;
  };
  ws.onerror=()=>{$('bnr-log-status').className='job-status error';$('bnr-log-status').textContent='connection error';};
  ws.onclose=()=>{ if(logEl.textContent&&!logEl.textContent.endsWith('\n')) logEl.textContent+='\n'; };
}
function closeBannerLog(){
  $('bnr-log-modal').classList.remove('open');
  if(_bnrLogWs){try{_bnrLogWs.close();}catch(e){}_bnrLogWs=null;}
}

async function _pollJobs(){
  try{
    const res=await fetch('/api/jobs');
    if(!res.ok)return;
    const jobs=await res.json();
    const running=Array.isArray(jobs)?jobs.filter(j=>j.status==='running'):[];
    if(running.length){
      running.forEach(j=>{ if(!_bnrActiveJobs.has(j.type)) _bnrActiveJobs.set(j.type,j.id); });
      if(!_bnrDismissed){
        const names=running.map(j=>_bnrLabels[j.type]||j.type);
        const txt=running.length>1?`${running.length} jobs (${names.join(', ')})`:names[0];
        $('bnr-text').textContent=txt+' running — tap to view log';
        $('run-banner').classList.add('visible');
      }
    } else if(_bnrActiveJobs.size===0){
      $('run-banner').classList.remove('visible');
    }
  }catch(e){}
}
setInterval(_pollJobs,3000);

  if(v==='overview')    renderOverview();
  if(v==='screenings')  renderScreenings();
  if(v==='trades')      renderTrades();
  if(v==='reflections') renderReflections();
  if(v==='performance') renderPerformance();
  if(v==='run')         renderRun();
}

document.addEventListener('DOMContentLoaded',()=>{
  const ts=DATA.generated_at?new Date(DATA.generated_at).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
  $('gen-ts').textContent=ts;
  applyView(currentView());   // honor /screenings (or #screenings) on initial load / reload
  setTimeout(_pollJobs,600);
});
