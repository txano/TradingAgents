<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingAgents Reports</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;
  --surface:#13161e;
  --card:#1a1d28;
  --hover:#1f2235;
  --elevated:#222538;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.11);
  --text:#e9e7e1;
  --dim:#8a8b9c;
  --muted:#50516a;
  --accent:#cf6e44;
  --accent-dim:#a85530;
  --accent-bg:rgba(207,110,68,0.09);
  --accent-border:rgba(207,110,68,0.22);
  --win:#4ade80;
  --win-bg:rgba(74,222,128,0.07);
  --win-border:rgba(74,222,128,0.2);
  --loss:#f87171;
  --loss-bg:rgba(248,113,113,0.07);
  --loss-border:rgba(248,113,113,0.2);
  --warn:#fbbf24;
  --warn-bg:rgba(251,191,36,0.07);
  --warn-border:rgba(251,191,36,0.2);
  --info:#60a5fa;
  --font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','JetBrains Mono','Fira Code',monospace;
  --sidebar-w:224px;
  --r:11px;--r-sm:7px;--r-xs:5px;
}
html{font-size:14px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;line-height:1.55}

/* ── Sidebar ─────────────────────────────────────────────── */
#sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:10}
.logo{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
.logo-mark{width:33px;height:33px;background:linear-gradient(135deg,var(--accent) 0%,#8a3515 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;box-shadow:0 3px 18px rgba(207,110,68,0.22);font-size:16px;font-weight:800;color:rgba(255,255,255,0.9);letter-spacing:-.5px;font-family:var(--mono)}
.logo h1{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--text);line-height:1.2}
.logo p{font-size:10.5px;color:var(--muted);margin-top:3px}
.nav{flex:1;padding:10px 0;overflow-y:auto}
.nav-sep{padding:13px 16px 5px;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;color:var(--dim);font-size:12.5px;font-weight:500;transition:all .12s;border-left:2px solid transparent;margin:1px 6px;border-radius:0 var(--r-sm) var(--r-sm) 0;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-item.active{color:var(--accent);background:var(--accent-bg);border-left-color:var(--accent);font-weight:600}
.nav-icon{font-size:12px;width:15px;text-align:center;flex-shrink:0}
.sidebar-footer{padding:13px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--muted)}
.sidebar-footer strong{color:var(--dim);display:block;margin-bottom:2px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}

/* ── Main ──────────────────────────────────────────────────── */
#main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;min-width:0}
.view{display:none;padding:38px 46px}
.view.active{display:block}

/* ── Page header ───────────────────────────────────────────── */
.ph{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.ph h2{font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.ph p{color:var(--dim);font-size:12.5px;margin-top:4px;line-height:1.45}

/* ── Stat grid ─────────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;transition:border-color .18s}
.stat:hover{border-color:var(--border2)}
.stat-label{font-size:9.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-size:25px;font-weight:800;letter-spacing:-.7px;line-height:1;font-family:var(--mono)}
.stat-sub{font-size:10.5px;color:var(--dim);margin-top:5px;line-height:1.35}

/* ── Section ───────────────────────────────────────────────── */
.section{margin-bottom:32px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--text)}
.sec-title::before{content:'';display:inline-block;width:2.5px;height:12px;background:var(--accent);border-radius:2px}
.see-all{font-size:11px;color:var(--accent);cursor:pointer;font-weight:500;opacity:.85}
.see-all:hover{opacity:1}

/* ── List card ─────────────────────────────────────────────── */
.lc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;cursor:pointer;transition:all .14s;margin-bottom:7px;display:flex;align-items:center;gap:13px}
.lc:hover{border-color:var(--border2);background:var(--hover)}
.lc-icon{font-size:13px;width:34px;height:34px;border-radius:8px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent)}
.lc-body{flex:1;min-width:0}
.lc-title{font-size:13px;font-weight:600;color:var(--text)}
.lc-sub{font-size:11px;color:var(--dim);margin-top:2px}
.lc-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* ── Badges ────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;border:1px solid transparent}
.b-win{background:var(--win-bg);color:var(--win);border-color:var(--win-border)}
.b-loss{background:var(--loss-bg);color:var(--loss);border-color:var(--loss-border)}
.b-buy{background:var(--win-bg);color:var(--win);border-color:var(--win-border)}
.b-short{background:var(--loss-bg);color:var(--loss);border-color:var(--loss-border)}
.b-skip{background:rgba(255,255,255,0.05);color:var(--dim);border-color:rgba(255,255,255,0.08)}
.b-high{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border)}
.b-medium{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
.b-low{background:rgba(255,255,255,0.05);color:var(--dim);border-color:rgba(255,255,255,0.08)}
.b-neutral,.b-break_even{background:rgba(255,255,255,0.05);color:var(--dim);border-color:rgba(255,255,255,0.08)}

/* ── Data table ────────────────────────────────────────────── */
.tw{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.dt{width:100%;border-collapse:collapse;font-size:12.5px}
.dt th{text-align:left;padding:9px 12px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:rgba(0,0,0,0.18);border-bottom:1px solid var(--border)}
.dt td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:rgba(255,255,255,0.025)}
.dt .row-buy td{background:rgba(74,222,128,0.028)}
.dt .row-buy:hover td{background:rgba(74,222,128,0.055)}
.dt .row-short td{background:rgba(248,113,113,0.028)}
.dt .row-short:hover td{background:rgba(248,113,113,0.055)}
.tr{text-align:right}.tm{font-family:var(--mono)}
.dt td.num{text-align:right;font-family:var(--mono);font-size:12px}
.one-liner-cell{max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--dim);font-size:11.5px}

/* ── Screening cards ───────────────────────────────────────── */
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.sc:hover{border-color:var(--border2)}
.sc-hd{display:flex;align-items:center;gap:14px;padding:15px 20px;cursor:pointer;user-select:none}
.sc-date{font-size:14.5px;font-weight:700;color:var(--text);flex-shrink:0;min-width:106px;letter-spacing:-.3px}
.sc-meta{flex:1}
.sc-actions{display:flex;gap:7px;flex-shrink:0;align-items:center}
.sc-body{display:none}
.ab{padding:5px 11px;border-radius:var(--r-xs);font-size:10.5px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--dim);transition:all .14s;letter-spacing:.01em}
.ab:hover{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border)}
.chevron{color:var(--muted);font-size:9px;transition:transform .2s;margin-left:2px}

/* ── Screening table (inline) ──────────────────────────────── */
.sc-table-wrap{border-top:1px solid var(--border);overflow-x:auto}
.sc-table-wrap .dt{font-size:12px}
.sc-table-wrap .dt td,.sc-table-wrap .dt th{padding:8px 11px}
.sc-table-wrap .dt .one-liner-cell{max-width:280px}
.sc-briefs-section{padding:14px 20px 16px;border-top:1px solid var(--border)}
.sc-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:9px}
.sc-alloc-section{padding:12px 20px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}

/* ── Ticker chips ──────────────────────────────────────────── */
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:var(--r-xs);font-size:10.5px;font-weight:700;font-family:var(--mono);margin:2px 3px 2px 0;cursor:pointer;border:1px solid transparent;transition:all .14s;letter-spacing:.03em}
.chip:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,0.25)}
.chip.buy{background:var(--win-bg);color:var(--win);border-color:var(--win-border)}
.chip.short{background:var(--loss-bg);color:var(--loss);border-color:var(--loss-border)}
.chip.skip,.chip{background:rgba(255,255,255,0.05);color:var(--dim);border-color:rgba(255,255,255,0.08)}

/* ── Score bars (overlay) ──────────────────────────────────── */
.score-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:18px 22px;background:rgba(0,0,0,0.18);border-bottom:1px solid var(--border)}
.score-item{text-align:center}
.score-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:6px}
.score-num{font-size:21px;font-weight:800;font-family:var(--mono);line-height:1}
.score-track{width:50px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:7px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;background:var(--accent)}
.score-fill.positive{background:var(--win)}
.score-fill.negative{background:var(--loss)}
.score-signals{display:flex;flex-direction:column;gap:5px;margin-left:auto}

/* ── Overlay ───────────────────────────────────────────────── */
#ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:none;justify-content:flex-end;backdrop-filter:blur(5px)}
#ov.open{display:flex}
#op{width:min(860px,92vw);background:var(--surface);height:100vh;display:flex;flex-direction:column;box-shadow:-24px 0 72px rgba(0,0,0,0.55);animation:slideIn .2s ease;border-left:1px solid var(--border)}
@keyframes slideIn{from{transform:translateX(36px);opacity:0}to{transform:translateX(0);opacity:1}}
#oh{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;background:rgba(0,0,0,0.12)}
#ot{font-size:13.5px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.1px}
#oc{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.05);border:1px solid var(--border);cursor:pointer;color:var(--dim);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .14s;flex-shrink:0}
#oc:hover{color:var(--text);background:rgba(255,255,255,0.08);border-color:var(--border2)}
#ob{flex:1;overflow-y:auto;padding:0}

/* ── PM decision band ──────────────────────────────────────── */
.pm-header{padding:10px 22px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);background:var(--accent-bg);border-bottom:1px solid var(--accent-border)}
.pm-body{padding:20px 24px}
.brief-header{padding:10px 22px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);background:rgba(255,255,255,0.03);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}

/* ── Markdown body ─────────────────────────────────────────── */
.md-body{color:var(--text);line-height:1.7;font-size:13px;padding:20px 24px}
.md-body h1{font-size:17px;font-weight:700;margin:0 0 14px;color:var(--text);letter-spacing:-.3px}
.md-body h2{font-size:14px;font-weight:700;margin:22px 0 9px;padding-bottom:7px;border-bottom:1px solid var(--border);color:var(--text)}
.md-body h3{font-size:13px;font-weight:600;margin:18px 0 7px;color:var(--accent)}
.md-body p{color:var(--dim);margin-bottom:10px}
.md-body strong{color:var(--text);font-weight:600}
.md-body em{font-style:italic}
.md-body ul,.md-body ol{padding-left:18px;margin-bottom:10px;color:var(--dim)}
.md-body li{margin-bottom:3px;line-height:1.6}
.md-body code{background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:11.5px;color:var(--accent)}
.md-body pre{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;overflow-x:auto;margin-bottom:13px}
.md-body pre code{background:none;padding:0;color:var(--dim);font-size:11.5px}
.md-body blockquote{border-left:3px solid var(--accent);padding:7px 14px;margin:12px 0;color:var(--dim);background:var(--accent-bg);border-radius:0 var(--r-sm) var(--r-sm) 0;font-style:italic}
.md-body hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.md-body a{color:var(--accent);text-decoration:none}
.md-body table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px}
.md-body th{background:rgba(0,0,0,0.2);padding:7px 11px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border)}
.md-body td{padding:7px 11px;border-bottom:1px solid var(--border);color:var(--dim)}
.md-body tr:last-child td{border-bottom:none}

/* ── Filters ───────────────────────────────────────────────── */
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fi{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);padding:6px 11px;font-size:12px;font-family:var(--font);outline:none;transition:border-color .14s}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--muted)}
.fb{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--dim);padding:6px 12px;font-size:11.5px;font-weight:500;cursor:pointer;transition:all .14s}
.fb:hover,.fb.on{border-color:var(--accent-border);color:var(--accent);background:var(--accent-bg)}

/* ── Reflection grid ───────────────────────────────────────── */
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:10px}
.rc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px 17px;cursor:pointer;transition:all .14s}
.rc:hover{border-color:var(--border2);background:var(--hover)}
.rc-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.rc-ticker{font-size:15.5px;font-weight:800;font-family:var(--mono);letter-spacing:-.2px}
.rc-date{font-size:10.5px;color:var(--muted);margin-top:2px}
.rc-lesson{font-size:11.5px;color:var(--dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* ── Performance ───────────────────────────────────────────── */
.day-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);font-size:12.5px}
.day-row:last-child{border-bottom:none}
.day-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;max-width:200px}
.day-bar{height:100%;border-radius:3px;background:var(--accent)}
.bench-row{display:flex;align-items:center;gap:0;padding:11px 16px;border-bottom:1px solid var(--border);border-left:2px solid transparent}
.bench-row:last-child{border-bottom:none}
.bench-name{font-weight:700;font-size:12.5px;width:52px;flex-shrink:0}
.bench-prices{font-family:var(--mono);font-size:11px;color:var(--dim);flex:1}
.bench-ret,.bench-pnl{font-family:var(--mono);font-size:12px;width:88px;text-align:right;flex-shrink:0}
.bench-diff{font-size:11px;font-weight:600;width:104px;text-align:right;flex-shrink:0}

/* ── Misc ──────────────────────────────────────────────────── */
.empty{text-align:center;padding:52px 24px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
.empty .ei{font-size:30px;margin-bottom:11px;display:block;opacity:.4}
.divider{border:none;border-top:1px solid var(--border);margin:24px 0}
.c-win{color:var(--win)}.c-loss{color:var(--loss)}.c-warn{color:var(--warn)}.c-accent{color:var(--accent)}.c-dim{color:var(--dim)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.16)}

/* ── Run tab ───────────────────────────────────────────────── */
.run-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:28px}
.run-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px}
.run-card h3{font-size:13px;font-weight:700;letter-spacing:-.2px;margin-bottom:4px;color:var(--text)}
.run-card p{font-size:11.5px;color:var(--dim);margin-bottom:18px;line-height:1.45}
.run-card.full{grid-column:1/-1}
label{display:block;font-size:11px;font-weight:600;color:var(--dim);margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
input[type=text],input[type=date],input[type=number],select{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-xs);color:var(--text);font-size:12.5px;padding:7px 10px;font-family:var(--font);outline:none;transition:border-color .14s}
input[type=text]:focus,input[type=date]:focus,input[type=number]:focus,select:focus{border-color:var(--accent)}
select option{background:var(--surface)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.form-field{margin-bottom:12px}
.checkrow{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.checkrow label{display:flex;align-items:center;gap:5px;text-transform:none;letter-spacing:0;font-size:12px;font-weight:500;color:var(--text);cursor:pointer}
.checkrow input[type=checkbox]{width:auto;accent-color:var(--accent)}
.btn-run{background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);padding:9px 20px;font-size:12.5px;font-weight:700;cursor:pointer;transition:background .14s;letter-spacing:.02em}
.btn-run:hover{background:var(--accent-dim)}
.btn-run:disabled{opacity:.45;cursor:not-allowed}
.job-log{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);font-family:var(--mono);font-size:11.5px;color:var(--dim);padding:14px 16px;min-height:200px;max-height:500px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-top:16px;display:none}
.job-log.active{display:block}
.job-status{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-left:12px;vertical-align:middle}
.job-status.running{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-border)}
.job-status.done{background:var(--win-bg);color:var(--win);border:1px solid var(--win-border)}
.job-status.error{background:var(--loss-bg);color:var(--loss);border:1px solid var(--loss-border)}

/* ── Performance dashboard ─────────────────────────────────── */
.dp-6col{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:14px}
.dp-5col{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px}
.dp-4col{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}

.dp-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.dp-chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.dp-chart-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

.dp-btn:hover{border-color:var(--text);color:var(--text)}

</style>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js" crossorigin="anonymous" onerror="window.marked=null"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ── Injected data ──────────────────────────────────────────────────────────
const DATA = __TRADINGAGENTS_DATA__;

// ── Utilities ──────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);

function md(t){
  if(!t)return'<p style="padding:20px 24px;color:var(--dim)">No content available.</p>';
  let html;
  if(window.marked){try{html=marked.parse(t)}catch(e){html=null}}
  if(!html)html=`<pre style="white-space:pre-wrap;font-size:12px;color:var(--dim);line-height:1.65;padding:20px 24px">${esc(t)}</pre>`;
  return`<div class="md-body">${html}</div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function cur(n,compact=false){
  if(n==null)return'—';
  const a=Math.abs(n),s=n<0?'-':'+';
  if(compact){if(a>=1e6)return s+'$'+(a/1e6).toFixed(1)+'M';if(a>=1e3)return s+'$'+(a/1e3).toFixed(0)+'K';return s+'$'+a.toFixed(0)}
  return(n>=0?'+':'')+n.toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0});
}
function pct(n){return n==null?'—':(n>=0?'+':'')+n.toFixed(2)+'%'}
function date(s){if(!s)return'—';try{const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch(e){return s}}
function cp(n){return n>0?'c-win':n<0?'c-loss':'c-dim'}
function badgeClass(v){
  if(!v)return'b-neutral';
  const l=v.toLowerCase();
  if(l==='win')return'b-win';if(l==='loss')return'b-loss';
  if(l==='buy')return'b-buy';if(l==='short')return'b-short';if(l==='skip')return'b-skip';
  if(l==='high')return'b-high';if(l==='medium')return'b-medium';if(l==='low')return'b-low';
  return'b-neutral';
}

function consolidate(trades){
  const m=new Map();
  (trades||[]).forEach(t=>{
    const k=(t.ticker||'')+'|'+(t.exit_date||''),sh=t.shares||0;
    if(!m.has(k)){m.set(k,{...t,pnl:t.pnl||0,shares:sh,_fills:1,_ew:(t.entry_price||0)*sh,_xw:(t.exit_price||0)*sh,_sw:sh})}
    else{const g=m.get(k);g._fills++;g.pnl+=t.pnl||0;g.shares+=sh;g._ew+=(t.entry_price||0)*sh;g._xw+=(t.exit_price||0)*sh;g._sw+=sh}
  });
  return Array.from(m.values()).map(g=>{
    if(g._sw>0){g.entry_price=g._ew/g._sw;g.exit_price=g._xw/g._sw;g.pnl_pct=g.entry_price*g._sw>0?g.pnl/(g.entry_price*g._sw)*100:null}
    g.outcome=g.pnl>0.005?'WIN':g.pnl<-0.005?'LOSS':'BREAK_EVEN';
    return g;
  }).sort((a,b)=>(b.exit_date||'')>(a.exit_date||'')?1:-1);
}

// ── Parse markdown pipe table → HTML table with color-coded rows ────────────
function parseMarkdownTable(mdText){
  if(!mdText)return'';
  const lines=mdText.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('|'));
  if(lines.length<2)return'';
  const isSep=l=>l.replace(/[\|\s\-:]/g,'').length===0;
  const splitCells=l=>l.split('|').slice(1,-1).map(c=>c.trim());
  const headers=splitCells(lines[0]);
  const dataLines=lines.filter((l,i)=>i>0&&!isSep(l));
  if(!headers.length||!dataLines.length)return'';

  const sigIdx=headers.findIndex(h=>/^signal$/i.test(h));
  const confIdx=headers.findIndex(h=>/^conf/i.test(h));
  const scoreIdxs=new Set(headers.map((h,i)=>/beat|guidance|setup|total|fund/i.test(h)?i:-1).filter(i=>i>=0));
  const olIdx=headers.findIndex(h=>/one.liner|one_liner/i.test(h));
  const numIdx=headers.findIndex(h=>/^#$/.test(h));

  let html='<div class="tw sc-table-wrap"><table class="dt"><thead><tr>';
  headers.forEach(h=>html+=`<th>${esc(h)}</th>`);
  html+='</tr></thead><tbody>';

  dataLines.forEach(line=>{
    const cells=splitCells(line);
    const sig=sigIdx>=0?(cells[sigIdx]||'').trim():'';
    const rowCls=sig==='BUY'?'row-buy':sig==='SHORT'?'row-short':'';
    html+=`<tr class="${rowCls}">`;
    headers.forEach((_,i)=>{
      const cell=(cells[i]||'').trim();
      let content=esc(cell);
      if(i===sigIdx){
        const bc=sig==='BUY'?'b-buy':sig==='SHORT'?'b-short':'b-skip';
        content=`<span class="badge ${bc}">${esc(sig)}</span>`;
      } else if(i===confIdx&&cell){
        const bc=cell==='High'?'b-high':cell==='Medium'?'b-medium':'b-low';
        content=`<span class="badge ${bc}">${esc(cell)}</span>`;
      } else if(scoreIdxs.has(i)&&cell){
        const num=parseFloat(cell);
        if(!isNaN(num)){
          const col=num>0?'c-win':num<0?'c-loss':'c-dim';
          content=`<span class="tm ${col}" style="font-weight:700">${num>=0?'+':''}${num}</span>`;
        }
      } else if(i===olIdx){
        content=`<span class="one-liner-cell">${esc(cell)}</span>`;
      } else if(i===numIdx){
        content=`<span style="color:var(--muted);font-size:11px">${esc(cell)}</span>`;
      }
      html+=`<td>${content}</td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

// ── Navigation ──────────────────────────────────────────────────────────────
let view='overview', tradeFilter={out:'all',dir:'all',q:''};
const VIEWS=['overview','screenings','trades','reflections','performance','run'];
// Served by FastAPI (http/https) → use clean paths (/screenings). Opened as a
// local file:// → fall back to hash routing (#screenings), since paths can't work there.
const usePath=(location.protocol==='http:'||location.protocol==='https:');
// Current view from the URL — path first (when served), then hash. Defaults to overview.
function currentView(){
  if(usePath){
    const seg=location.pathname.replace(/^\/+|\/+$/g,'').split('/').pop();
    if(VIEWS.includes(seg))return seg;
  }
  const h=(location.hash||'').replace(/^#\/?/,'').split('?')[0].trim();
  return VIEWS.includes(h)?h:'overview';
}
// Switch the active view + render it. Does NOT touch the URL.
function applyView(v){
  if(!VIEWS.includes(v))v='overview';
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  $('v-'+v).classList.add('active');$('ni-'+v).classList.add('active');
  view=v;render(v);window.scrollTo(0,0);
  document.title='TradingAgents — '+v.charAt(0).toUpperCase()+v.slice(1);
}
// Navigate to a view (nav click) — updates the URL so it's bookmarkable/reload-safe.
function go(v){
  if(!VIEWS.includes(v))v='overview';
  if(usePath){
    const url=(v==='overview'?'/':'/'+v);
    if(location.pathname!==url){try{history.pushState({v},'',url);}catch(e){}}
  } else if(('#'+v)!==location.hash){location.hash=v;}
  applyView(v);mobClose();
}
window.addEventListener('popstate',()=>applyView(currentView()));
window.addEventListener('hashchange',()=>{if(!usePath)applyView(currentView());});

// ── Overlay ──────────────────────────────────────────────────────────────────
function openDetail(title,html){$('ot').textContent=title;$('ob').innerHTML=html;$('ov').classList.add('open');document.body.style.overflow='hidden'}
function closeDetail(){$('ov').classList.remove('open');document.body.style.overflow=''}
$('ov').addEventListener('click',e=>{if(e.target===$('ov'))closeDetail()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});

// ── Score widget ─────────────────────────────────────────────────────────────
function scoreWidget(label,score,max){
  const n=score!=null?score:0,raw=n/max,pf=Math.max(0,Math.min(100,Math.abs(raw)*100));
  const textCol=raw>=0.6?'var(--win)':raw<0?'var(--loss)':'var(--accent)';
  const fillCls=raw>=0.4?'positive':raw<0?'negative':'';
  return`<div class="score-item">
    <div class="score-lbl">${esc(label)}</div>
    <div class="score-num" style="color:${textCol}">${n>=0?'+':''}${n}</div>
    <div class="score-track"><div class="score-fill ${fillCls}" style="width:${pf}%"></div></div>
  </div>`;
}

// ── Overview ─────────────────────────────────────────────────────────────────
function renderOverview(){
  $('v-overview').innerHTML=`

// ── Screenings ──────────────────────────────────────────────────────────────
function buildScreeningIndex() {
  const idx = {};
  (DATA.screening_runs||[]).forEach(run => {
    (run.tickers||[]).forEach(t => {
      if(!idx[t.ticker]) idx[t.ticker]=[];
      idx[t.ticker].push({run, data:t});
    });
  });
  Object.keys(idx).forEach(tk => idx[tk].sort((a,b) => b.run.date.localeCompare(a.run.date)));
  return idx;
}

function nextWeekdayStr(base, offset) {
  let d = new Date(base+'T00:00:00');
  while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+1);
  for(let i=0;i<offset;i++){d.setDate(d.getDate()+1);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);}
  return d.toISOString().slice(0,10);
}

function renderCalDayCard(d, day, scrIdx) {
  const entries = day.entries||[];
  const fetchedAt = day.fetched_at?new Date(day.fetched_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
  const screenedCount = entries.filter(e=>(scrIdx[e.ticker]||[]).length>0).length;
  const sc = n => n!=null?`<span class="${n>0?'c-win':n<0?'c-loss':'c-dim'}" style="font-weight:700;font-family:var(--mono)">${n>=0?'+':''}${n}</span>`:'<span style="color:var(--muted)">—</span>';

  const dayRun = (DATA.screening_runs||[]).find(r=>r.earnings_date===d && r.allocation_md);

  const depthLabel = d => { const n=parseInt(d)||0; return n<=1?'Shallow':n<=3?'Medium':'Deep'; };
  const rows = entries.map(e=>{
    const scrs = (scrIdx[e.ticker]||[]).filter(s => !s.run.earnings_date || s.run.earnings_date === d);
    const latest = scrs[0];
    const sessColor = e.session==='AH'?'var(--accent)':e.session==='PM'?'var(--info)':'var(--dim)';
    let sigHtml='<span style="color:var(--muted)">—</span>';
    let beatH=sc(null),guidH=sc(null),setupH=sc(null),totH=sc(null),fundH='<span style="color:var(--muted)">—</span>',confH='<span style="color:var(--muted)">—</span>',histH='';
    if(latest){
      const td=latest.data, sig=td.signal||'—';
      const sbc=sig==='BUY'?'b-buy':sig==='SHORT'?'b-short':'b-skip';
      sigHtml=`<span class="badge ${sbc}" style="cursor:pointer" onclick="openTickerDetail('${latest.run.id}','${esc(e.ticker)}')">${esc(sig)}</span>`;
      beatH=sc(td.beat_score);guidH=sc(td.guidance_score);setupH=sc(td.setup_score);totH=sc(td.total_score);
      fundH=td.fundamentals_score!=null?sc(td.fundamentals_score):'<span style="color:var(--muted)">—</span>';
      const cc=td.confidence||'—';
      confH=`<span class="badge ${cc==='High'?'b-high':cc==='Medium'?'b-medium':'b-low'}">${esc(cc)}</span>`;
      if(scrs.length>1) histH=`<button class="cal-remove-btn" style="color:var(--accent);font-weight:700;font-size:11px;padding:1px 5px" onclick="openTickerHistory('${esc(e.ticker)}',event)" title="${scrs.length} screenings">×${scrs.length}</button>`;
    }
    const tkHtml=latest
      ?`<strong class="tm" style="cursor:pointer;color:var(--accent)" onclick="openTickerDetail('${latest.run.id}','${esc(e.ticker)}')">${esc(e.ticker)}</strong>`
      :`<strong class="tm">${esc(e.ticker)}</strong>`;
    const oneLineTd = latest
      ?`<td style="color:var(--dim);font-size:11px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(latest.data.one_liner||'')}">${esc(latest.data.one_liner||'')}</td>`
      :`<td></td>`;
    const depthTd = latest?.run?.depth
      ?`<td style="font-size:11px;color:var(--dim)">${depthLabel(latest.run.depth)}</td>`
      :`<td></td>`;
    const allocTd = latest?.data?.allocation_amount
      ?`<td class="num" style="color:var(--win)">$${Math.round(latest.data.allocation_amount/1000)}k</td>`
      :`<td></td>`;
    return `<tr>
      <td style="text-align:center;width:30px"><input type="checkbox" data-calscr="${d}" value="${esc(e.ticker)}" checked style="accent-color:var(--accent)"></td>
      <td>${tkHtml}</td>
      <td style="color:var(--dim);font-size:11.5px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e.company||'')}</td>
      <td><span style="color:${sessColor};font-size:10px;font-weight:700;text-transform:uppercase">${esc(e.session)}</span></td>
      <td style="color:var(--dim);font-family:var(--mono);font-size:11.5px">${fmtMCap(e.market_cap)}</td>
      <td style="text-align:center">${sigHtml}</td>
      <td class="num">${beatH}</td><td class="num">${guidH}</td><td class="num">${setupH}</td><td class="num" title="Fundamentals quality score">${fundH}</td><td class="num">${totH}</td>
      <td>${confH}</td>
      ${depthTd}${allocTd}
      ${oneLineTd}
      <td style="text-align:center">${histH}</td>
      <td style="text-align:center"><button class="cal-remove-btn" onclick="csRemoveTicker('${d}','${esc(e.ticker)}')" title="Remove">✕</button></td>
    </tr>`;
  }).join('');

  const tableHtml = entries.length
    ?`<div style="overflow-x:auto"><table class="dt"><thead><tr>
        <th style="width:30px;text-align:center"><input type="checkbox" checked onclick="calScrSelectAll('${d}',this.checked)" style="accent-color:var(--accent)"></th>
        <th>Ticker</th><th>Company</th><th>Session</th><th>Mkt Cap</th>
        <th style="text-align:center">Signal</th><th class="tr">Beat</th><th class="tr">Guid</th><th class="tr">Setup</th><th class="tr" title="Fundamentals quality score (-5 to +5)">Funds</th><th class="tr">Total</th>
        <th>Conf</th><th>Depth</th><th class="tr">Alloc</th><th style="max-width:200px">One-liner</th>
        <th style="text-align:center" title="Past screenings">Hist</th><th></th>
      </tr></thead><tbody>${rows}</tbody></table></div>`
    :`<div style="padding:14px 18px;color:var(--muted);font-size:12px">No entries yet. Re-fetch from NASDAQ or add tickers below.</div>`;

  return `<div class="cal-day">
    <div class="cal-day-hd" onclick="toggleCalDay('${d}')" style="cursor:pointer">
      <span class="chevron" id="cal-ch-${d}" style="color:var(--muted)">▶</span>
      <div style="flex:1">
        <div class="cal-day-title">${fmtCalDay(d)}</div>
        <div class="cal-day-sub">${entries.length} companies · ${screenedCount} screened · fetched ${fetchedAt}</div>
      </div>
      ${dayRun?`<button class="ab" style="margin-right:8px" onclick="event.stopPropagation();openDetail('Allocation — ${fmtCalDay(d)}',md(DATA.screening_runs.find(x=>x.id==='${dayRun.id}').allocation_md))">Allocation</button>`:''}
      <button class="cal-screen-btn" onclick="event.stopPropagation();calScreenDay('${d}')">Screen Selected ▶</button>
    </div>
    <div id="cal-bd-${d}" style="display:none">
      ${tableHtml}
      <div class="cal-add-row">
        <input type="text" id="csa-${d}" placeholder="Add tickers: AAPL, MSFT, …">
        <button class="ab" onclick="csAddTickers('${d}','csa-${d}')">Add</button>
      </div>
    </div>
  </div>`;
}

async function calLoadForScreenings() {
  const el=$('cal-scr-days'); if(!el) return;
  const scrIdx=buildScreeningIndex();
  try {
    const res=await fetch('/api/calendar'); if(!res.ok) throw new Error(await res.text());
    const cal=await res.json();
    const days=Object.keys(cal).sort().reverse();
    el.innerHTML=days.length
      ?days.map(d=>renderCalDayCard(d,cal[d],scrIdx)).join('')
      :'<div style="padding:18px 0;color:var(--muted);font-size:12px">No calendar data yet. Select a date range above and click "Fetch from NASDAQ".</div>';
  } catch(e) { if(el) el.innerHTML=`<div style="padding:12px;color:var(--muted)">Error: ${esc(e.message)}</div>`; }
}

async function calFetchRange() {
  const from=$('cal-from')?.value, to=$('cal-to')?.value;
  if(!from||!to){alert('Please select a date range.');return;}
  const btn=$('cal-range-btn'); if(btn){btn.disabled=true;btn.textContent='Fetching…';}
  try {
    const res=await fetch('/api/calendar/fetch-range',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({start:from,end:to})});
    if(!res.ok) throw new Error(await res.text());
    renderScreenings();
  } catch(e) {
    alert('Error: '+e.message);
    const b=$('cal-range-btn'); if(b){b.disabled=false;b.textContent='Fetch from NASDAQ';}
  }
}

function toggleCalDay(d){
  const body=document.getElementById('cal-bd-'+d), chev=document.getElementById('cal-ch-'+d);
  if(!body) return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'';
  if(chev){chev.style.transform=open?'':'rotate(90deg)';chev.style.color=open?'var(--muted)':'var(--accent)';}
}

function calScrSelectAll(date,checked){document.querySelectorAll(`input[data-calscr="${date}"]`).forEach(cb=>cb.checked=checked);}

function calScreenDay(date){
  const checked=Array.from(document.querySelectorAll(`input[data-calscr="${date}"]:checked`)).map(cb=>cb.value);
  if(!checked.length){alert('No tickers selected.');return;}
  openScreenModal(checked,date);
}

async function csAddTickers(date,inputId){
  const inp=document.getElementById(inputId); if(!inp||!inp.value.trim()) return;
  const val=inp.value;
  try {
    const res=await fetch('/api/calendar/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date,tickers:val})});
    if(!res.ok) throw new Error(await res.text());
    renderScreenings();
  } catch(e){alert('Error: '+e.message);}
}

async function csRemoveTicker(date,ticker){
  try {
    const res=await fetch(`/api/calendar/${date}/${encodeURIComponent(ticker)}`,{method:'DELETE'});
    if(!res.ok) throw new Error(await res.text());
    renderScreenings();
  } catch(e){alert('Error: '+e.message);}
}

function openTickerHistory(ticker,ev){
  if(ev) ev.stopPropagation();
  const scrs=buildScreeningIndex()[ticker]||[];
  if(!scrs.length) return;
  let body='<div style="padding:0 22px">';
  scrs.forEach(({run,data})=>{
    const sig=data.signal||'—', bc=sig==='BUY'?'b-buy':sig==='SHORT'?'b-short':'b-skip';
    const tot=data.total_score||0;
    body+=`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1">
        <div style="font-size:12.5px;font-weight:600">${esc(run.date)}</div>
        <div style="font-size:11px;color:var(--dim)">Run: ${esc(run.id)} · Total: <span class="${tot>=0?'c-win':'c-loss'}" style="font-weight:700">${tot>=0?'+':''}${tot}</span></div>
      </div>
      <span class="badge ${bc}">${esc(sig)}</span>
      <button class="ab" onclick="closeDetail();openTickerDetail('${run.id}','${esc(ticker)}')">View →</button>
    </div>`;
  });
  body+='</div>';
  openDetail(`${esc(ticker)} — Screening History (${scrs.length})`,body);
}

// ── Screen modal ──────────────────────────────────────────────────────────────
let _smTickers=[],_smDate='',_smWs=null;

function openScreenModal(tickers,date){
  _smTickers=tickers; _smDate=date;
  $('scr-modal').style.display='flex';
  document.body.style.overflow='hidden';
  _renderSMForm();
}
function closeScreenModal(){
  $('scr-modal').style.display='none';
  document.body.style.overflow='';
  if(_smWs){try{_smWs.close();}catch(e){} _smWs=null;}
}
function _renderSMForm(){
  const pOpts=(s='deepseek')=>PROVIDERS.map(p=>`<option value="${p}"${p===s?' selected':''}>${p}</option>`).join('');
  const mOpts=(prov='deepseek',sel='')=>(MODELS[prov]||[]).map(m=>`<option value="${m}"${m===sel?' selected':''}>${m}</option>`).join('');
  $('scr-mt').textContent=`Screen ${_smTickers.length} ticker${_smTickers.length!==1?'s':''} — ${_smDate}`;
  $('scr-mb').innerHTML=`
    <div style="margin-bottom:16px;display:flex;flex-wrap:wrap;gap:4px">${_smTickers.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div>
    <div class="form-row">
      <div><label>Date</label><input type="date" id="sm-date" value="${_smDate}" style="color-scheme:dark"></div>
      <div><label>Budget ($)</label><input type="number" id="sm-budget" value="100000" min="1000"></div>
    </div>
    <div class="form-row">
      <div><label>Depth</label><select id="sm-depth"><option value="1">Shallow (1 round)</option><option value="3" selected>Medium (3 rounds)</option><option value="5">Deep (5 rounds)</option></select></div>
      <div><label>Workers</label><input type="number" id="sm-workers" value="1" min="1" max="8"></div>
    </div>
    <div class="form-row"><div><label>Provider</label><select id="sm-prov" onchange="smUpdateModels()">${pOpts()}</select></div></div>
    <div class="form-row">
      <div><label>Quick model</label><select id="sm-qm">${mOpts('deepseek','deepseek-chat')}</select></div>
      <div><label>Deep model</label><select id="sm-dm">${mOpts('deepseek','deepseek-reasoner')}</select></div>
    </div>
    <div class="form-field"><label>Analysts</label><div class="checkrow">
      ${['market','social','news','fundamentals'].map(a=>`<label><input type="checkbox" value="${a}" checked> ${a}</label>`).join('')}
    </div></div>
    <div style="margin-top:20px;display:flex;gap:10px;align-items:center">
      <button class="btn-run" id="sm-submit" onclick="runScreenModal()">▶ Run Screen</button>
      <button class="dp-btn" onclick="closeScreenModal()">Cancel</button>
    </div>`;
}
function smUpdateModels(){
  const prov=document.getElementById('sm-prov')?.value||'deepseek';
  ['sm-qm','sm-dm'].forEach(id=>{const s=document.getElementById(id);if(!s)return;s.innerHTML=(MODELS[prov]||[]).map(m=>`<option value="${m}">${m}</option>`).join('');});
}
async function runScreenModal(){
  const g=id=>document.getElementById(id)?.value||'';
  const analysts=Array.from(document.querySelectorAll('#scr-mb .checkrow input:checked')).map(b=>b.value);
  const date=g('sm-date');
  const params={tickers:_smTickers.join(','),date,earnings_date:_smDate,depth:g('sm-depth'),workers:g('sm-workers'),budget:g('sm-budget'),provider:g('sm-prov'),quick_model:g('sm-qm'),deep_model:g('sm-dm'),analysts};
  $('scr-mt').textContent=`Screening ${_smTickers.length} ticker${_smTickers.length!==1?'s':''} — ${date}`;
  $('scr-mb').innerHTML=`
    <div style="margin-bottom:12px;display:flex;flex-wrap:wrap;gap:4px;align-items:center">
      ${_smTickers.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}
      <span id="sm-status" class="job-status running" style="margin-left:8px">⟳ running</span>
    </div>
    <div class="job-log active" id="sm-log" style="min-height:200px;max-height:360px"></div>
    <div id="sm-done-row" style="display:none;margin-top:14px;gap:10px;align-items:center"></div>`;
  let jobId;
  try {
    const res=await fetch('/api/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'screen',params})});
    if(!res.ok) throw new Error(await res.text());
    ({job_id:jobId}=await res.json());
  } catch(e){
    const l=$('sm-log');if(l)l.textContent='Error: '+e.message;
    const st=$('sm-status');if(st){st.className='job-status error';st.textContent='✕ error';}
    return;
  }
  _bnrShow('screen',jobId);
  const proto=location.protocol==='https:'?'wss:':'ws:';
  const ws=new WebSocket(`${proto}//${location.host}/ws/${jobId}`);
  _smWs=ws;
  ws.onmessage=e=>{
    if(e.data==='__DONE__'){
      _bnrHide('screen');
      const st=$('sm-status');if(st){st.className='job-status done';st.textContent='✓ done';}
      // Pre-fetch fresh data so Screenings view is ready immediately
      _screeningsRefreshing=false;
      fetch('/api/data').then(r=>r.ok?r.json():null).then(fresh=>{if(fresh)Object.assign(DATA,fresh);}).catch(()=>{});
      const dr=$('sm-done-row');if(dr){dr.style.display='flex';dr.innerHTML=`<button class="btn-run" onclick="closeScreenModal();go('screenings')">View in Screenings</button><button class="dp-btn" onclick="closeScreenModal()" style="margin-left:6px">Close</button>`;}
      return;
    }
    if(e.data==='__ERROR__'){_bnrHide('screen');const st=$('sm-status');if(st){st.className='job-status error';st.textContent='✕ error';}return;}
    const l=$('sm-log');if(l){l.textContent+=e.data+'\n';l.scrollTop=l.scrollHeight;}
  };
  ws.onerror=()=>{_bnrHide('screen');const st=$('sm-status');if(st){st.className='job-status error';st.textContent='✕ ws error';}};
}

let _screeningsRefreshing=false;

function sigRow(label,val,tip){
  return `<div style="display:flex;gap:12px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
    <div style="min-width:200px;color:var(--muted)"${tip?` title="${esc(tip)}"`:''}>${esc(label)}</div>

}
// Signed % string with win/loss colouring.
function pct(v,dp){ if(v==null)return '—'; const s=(v>0?'+':'')+Number(v).toFixed(dp==null?1:dp)+'%';
  return `<span style="color:${v>0?'var(--win)':(v<0?'var(--loss)':'var(--dim)')}">${s}</span>`; }
function renderCouncilSignals(t){
  const p=t.pricing, a=t.asymmetry, c=t.crowding, pe=t.peers;
  if(!p && !a && !c && !pe) return '';
  let rows='';
  if(p){
    const mv=p.implied_move_pct!=null?`±${p.implied_move_pct}%`+(p.implied_move_expiry?` <span style="color:var(--muted)">(exp ${esc(p.implied_move_expiry)})</span>`:''):'—';
    rows+=sigRow('Implied earnings move',mv,'ATM straddle ÷ spot for the first expiry after earnings');
    const meta=[p.price!=null?`Spot $${Number(p.price).toFixed(2)}`:null,
      p.forward_pe!=null?`Fwd P/E ${p.forward_pe}`:null,
      p.week52_position_pct!=null?`52w pos ${p.week52_position_pct}%`:null].filter(Boolean).join(' · ');
    if(meta)rows+=sigRow('Valuation',meta);
  }
  if(a && a.n_prints){
    const evStr=a.ev!=null?(`<b>${pct(a.ev)}</b>`+(a.ev_to_implied!=null?` <span style="color:var(--muted)">(EV/move ${(a.ev_to_implied>0?'+':'')+a.ev_to_implied})</span>`:'')):'<span style="color:var(--dim)">n/a — no recent miss</span>';
    rows+=sigRow('EV (long into print)',evStr,'P(beat)·E[move|beat] + (1−P(beat))·E[move|miss]');
    const det=[a.e_move_beat!=null?`E[beat] ${pct(a.e_move_beat)}`:null,
      a.e_move_miss!=null?`E[miss] ${pct(a.e_move_miss)}`:null,
      a.fade_rate!=null?`fade ${Math.round(a.fade_rate*100)}%`:null,
      a.coverage_ratio!=null?`coverage ${a.coverage_ratio}×`:null].filter(Boolean).join(' · ');
    rows+=sigRow(`Payoff history (${a.n_beats}B/${a.n_misses}M · ${a.n_prints} prints)`,det);
  }
  if(c){
    const parts=[c.runup_1m_pct!=null?`1m ${pct(c.runup_1m_pct)}`:null,
      c.runup_1m_vs_sector!=null?`${pct(c.runup_1m_vs_sector)} vs ${esc(c.sector_etf||'sector')}`:null,
      c.dist_52w_high_pct!=null?`${c.dist_52w_high_pct}% below 52w high`:null].filter(Boolean).join(' · ');
    if(parts)rows+=sigRow('Run-up / crowding',parts);
    if(c.flags && c.flags.length)rows+=sigRow('',`<span style="color:var(--warn)">⚠ ${c.flags.map(esc).join(' · ')}</span>`);
  }
  if(pe && pe.has_map){
    if(pe.n_reported){
      const chips=(pe.peers||[]).map(x=>{
        const mv=x.day1_move_pct!=null?(x.day1_move_pct>0?'+':'')+Math.round(x.day1_move_pct)+'%':'';
        const tag=x.beat?'B':(x.beat===false?'M':'?');
        const col=x.beat_and_fell?'var(--loss)':(x.beat?'var(--win)':'var(--dim)');
        return `<span style="color:${col}" title="${esc(x.peer)} · ${x.days_ago}d ago">${esc(x.peer)} ${tag}${mv}${x.beat_and_fell?'!':''}</span>`;
      }).join('  ·  ');
      rows+=sigRow('Peer read-through',chips);
      if(pe.sector_bar_elevated)rows+=sigRow('',`<span style="color:var(--loss)">⚠ Elevated bar — a peer beat and still fell; downgrade conviction</span>`);
    } else {
      rows+=sigRow('Peer read-through','<span style="color:var(--muted)">No peers reported in the lookback window</span>');
    }
  }
  if(!rows)return '';
  return `<div class="brief-header">Council Signals</div><div style="padding:8px 22px 14px">${rows}</div>`;
}

  // Council Signals (#14 pricing/EV/asymmetry/crowding, #9 peers)

let dashCharts={}, dashAvgMode='arith', dashDirMode='count';
let dashSortKey='exit_date', dashSortDir=-1;
let dashAll=[];
const dm=n=>n==null?'—':(n<0?'-$':'$')+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const dp=n=>n==null?'—':(n>=0?'+':'')+n.toFixed(2)+'%';
const dpR=n=>n==null?'—':(n>=0?'+':'')+(n*100).toFixed(2)+'%';
const dcc=n=>n>0?'c-win':n<0?'c-loss':'';
const dGridColor='rgba(51,65,85,0.5)',dTickColor='#8a8b9c';

function dashCostBasis(t){const ep=t.entry_price,sh=t.shares;if(ep&&sh)return ep*sh;const pp=t.pnl_pct;if(pp&&t.pnl)return Math.abs(t.pnl/pp*100);return null;}

function dashAvgReturn(group){
  if(!group.length)return{val:null,pct:null};
  const sumPnl=group.reduce((s,t)=>s+(t.pnl||0),0);
  if(dashAvgMode==='arith')return{val:sumPnl/group.length,pct:group.reduce((s,t)=>s+(t.pnl_pct||0),0)/group.length};
  let wSumPct=0,wSum=0;
  group.forEach(t=>{const cb=dashCostBasis(t);if(cb){wSumPct+=(t.pnl_pct||0)*cb;wSum+=cb;}});
  return{val:sumPnl/group.length,pct:wSum?wSumPct/wSum:group.reduce((s,t)=>s+(t.pnl_pct||0),0)/group.length};
}

function dashComputeReturns(trades){
  const valid=trades.filter(t=>t.pnl!=null);
  if(!valid.length)return null;
  const sorted=[...valid].sort((a,b)=>(a.exit_date||'').localeCompare(b.exit_date||''));
  let twrFactor=1,totalCost=0,totalPnl=0;
  sorted.forEach(t=>{const cb=dashCostBasis(t),p=t.pnl||0;totalPnl+=p;if(cb&&cb>0){twrFactor*=(1+p/cb);totalCost+=cb;}else if(t.pnl_pct!=null){twrFactor*=(1+t.pnl_pct/100);}});
  const twr=twrFactor-1,mwr=totalCost>0?totalPnl/totalCost:null;
  const dates=sorted.map(t=>t.exit_date).filter(Boolean);
  let days=dates.length>=2?(new Date(dates[dates.length-1])-new Date(dates[0]))/86400000:0;
  const ann=r=>days>=7?Math.pow(1+r,365/days)-1:null;
  return{twr,twrAnn:ann(twr),mwr,mwrAnn:mwr!==null?ann(mwr):null,days:Math.round(days),totalCost,totalPnl};
}

function dashGetDisplay(){
  const tk=($('dp-f-ticker')||{}).value?.trim().toUpperCase()||'';
  const dir=($('dp-f-dir')||{}).value||'';

  const sec=($('dp-f-sector')||{}).value||'';
  const fr=($('dp-f-from')||{}).value||'';

  const raw=dashAll.filter(t=>(!tk||(t.ticker||'').includes(tk))&&(!dir||t.direction===dir)&&(!sec||t.sector===sec)&&(!fr||(t.exit_date||'')>=fr)&&(!to||(t.exit_date||'')<=to));
  let trades=consolidate(raw);
  if(out)trades=trades.filter(t=>t.outcome===out);
  return trades;
}

  dashRenderCharts(trades);dashRenderTable(trades);
}

function dashRenderStats(trades){
  const wins=trades.filter(t=>t.outcome==='WIN').length;
  const total=trades.reduce((s,t)=>s+(t.pnl||0),0);
  const avg=trades.length?total/trades.length:0;
  const wr=trades.length?wins/trades.length*100:null;
  const sorted=[...trades].sort((a,b)=>(a.pnl||0)-(b.pnl||0));
  const best=sorted[sorted.length-1],worst=sorted[0];
  const totalFills=trades.reduce((s,t)=>s+(t._fills||1),0);
  $('dp-s-total')&&($('dp-s-total').textContent=trades.length);
  $('dp-s-total-sub')&&($('dp-s-total-sub').textContent=totalFills!==trades.length?`${totalFills} fills`:'');
  const wrEl=$('dp-s-wr');if(wrEl){wrEl.textContent=wr!=null?wr.toFixed(1)+'%':'—';wrEl.className='stat-value '+(wr>=50?'c-win':wr!=null?'c-loss':'');}
  const pEl=$('dp-s-pnl');if(pEl){pEl.textContent=dm(+total.toFixed(2));pEl.className='stat-value '+dcc(total);}
  const aEl=$('dp-s-avg');if(aEl){aEl.textContent=trades.length?dm(+avg.toFixed(2)):'—';aEl.className='stat-value '+dcc(avg);}
  $('dp-s-best')&&($('dp-s-best').textContent=best?dm(best.pnl):'—');
  $('dp-s-best-t')&&($('dp-s-best-t').textContent=best?best.ticker:'');
  $('dp-s-worst')&&($('dp-s-worst').textContent=worst?dm(worst.pnl):'—');
  $('dp-s-worst-t')&&($('dp-s-worst-t').textContent=worst?worst.ticker:'');
}

function dashRenderAvgReturns(trades){
  const wins=trades.filter(t=>t.outcome==='WIN'),losses=trades.filter(t=>t.outcome==='LOSS');
  const wr=trades.length?wins.length/trades.length:0,lr=trades.length?losses.length/trades.length:0;
  const wS=dashAvgReturn(wins),lS=dashAvgReturn(losses);
  $('dp-s-avgwin-val')&&($('dp-s-avgwin-val').textContent=wS.val!=null?dm(+wS.val.toFixed(2)):'—');
  $('dp-s-avgwin-pct')&&($('dp-s-avgwin-pct').textContent=wS.pct!=null?dp(wS.pct):'');
  $('dp-s-avgloss-val')&&($('dp-s-avgloss-val').textContent=lS.val!=null?dm(+lS.val.toFixed(2)):'—');
  $('dp-s-avgloss-pct')&&($('dp-s-avgloss-pct').textContent=lS.pct!=null?dp(lS.pct):'');
  const pfEl=$('dp-s-pf');
  if(pfEl&&wS.val!=null&&lS.val!=null&&lS.val!==0){const pf=Math.abs(wS.val)/Math.abs(lS.val);pfEl.textContent=pf.toFixed(2);pfEl.className='stat-value '+(pf>=1?'c-win':'c-loss');}
  else if(pfEl){pfEl.textContent='—';pfEl.className='stat-value';}
  const expEl=$('dp-s-exp');
  if(expEl&&wS.val!=null&&lS.val!=null){const e=wr*wS.val+lr*lS.val;expEl.textContent=dm(+e.toFixed(2));expEl.className='stat-value '+dcc(e);}
  else if(expEl){expEl.textContent='—';expEl.className='stat-value';}
  const rEl=$('dp-s-ratio-pct');
  if(rEl&&wS.pct!=null&&lS.pct!=null&&lS.pct!==0){const r=Math.abs(wS.pct)/Math.abs(lS.pct);rEl.textContent=r.toFixed(2)+'x';rEl.className='stat-value '+(r>=1?'c-win':'c-loss');}
  else if(rEl){rEl.textContent='—';rEl.className='stat-value';}
  $('dp-s-ratio-mode')&&($('dp-s-ratio-mode').textContent=dashAvgMode==='arith'?'arithmetic avg':'weighted avg');
}

function dashRenderDashReturns(trades){
  const r=dashComputeReturns(trades);
  if(!r){['dp-s-twr','dp-s-twr-ann','dp-s-mwr','dp-s-mwr-ann'].forEach(id=>{const el=$(id);if(el){el.textContent='—';el.className='stat-value';}});$('dp-s-returns-meta')&&($('dp-s-returns-meta').textContent='');return;}
  const sv=(id,val)=>{const el=$(id);if(!el)return;el.textContent=val!=null?dpR(val):'—';el.className='stat-value '+(val!=null?dcc(val):'');};
  sv('dp-s-twr',r.twr);sv('dp-s-twr-ann',r.twrAnn);sv('dp-s-mwr',r.mwr);sv('dp-s-mwr-ann',r.mwrAnn);
  $('dp-s-returns-meta')&&($('dp-s-returns-meta').textContent=r.days>0?`${r.days}-day period · capital deployed: ${dm(Math.round(r.totalCost))}`:'single-day period · no annualization');
}

function dashRenderCharts(trades){dashBuildCum(trades);dashBuildMonthly(trades);dashBuildTicker(trades);dashBuildDir(trades);}

const dpBaseOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};

function dashBuildCum(trades){
  const can=$('dp-c-cum');if(!can||typeof Chart==='undefined')return;
  const pts=[...trades].sort((a,b)=>(a.exit_date||'').localeCompare(b.exit_date||''));
  let cum=0;const labels=[],data=[];
  pts.forEach(t=>{cum+=t.pnl||0;labels.push(t.exit_date||'');data.push(+cum.toFixed(2));});
  const green=(data[data.length-1]??0)>=0;
  if(dashCharts.cum)dashCharts.cum.destroy();
  dashCharts.cum=new Chart(can,{type:'line',data:{labels,datasets:[{data,fill:true,borderColor:green?'#4ade80':'#f87171',backgroundColor:green?'rgba(74,222,128,0.08)':'rgba(248,113,113,0.08)',borderWidth:2,pointRadius:data.length>60?0:3,pointHoverRadius:4,tension:0.3}]},options:{...dpBaseOpts,scales:{x:{display:false},y:{grid:{color:dGridColor},ticks:{color:dTickColor,callback:v=>'$'+v.toLocaleString()}}}}});
}

function dashBuildMonthly(trades){
  const can=$('dp-c-monthly');if(!can||typeof Chart==='undefined')return;
  const m={};trades.forEach(t=>{const k=(t.exit_date||'').slice(0,7);if(k)m[k]=(m[k]||0)+(t.pnl||0);});
  const labels=Object.keys(m).sort(),data=labels.map(l=>+m[l].toFixed(2));
  if(dashCharts.monthly)dashCharts.monthly.destroy();
  dashCharts.monthly=new Chart(can,{type:'bar',data:{labels,datasets:[{data,backgroundColor:data.map(v=>v>=0?'rgba(74,222,128,0.65)':'rgba(248,113,113,0.65)'),borderRadius:4}]},options:{...dpBaseOpts,scales:{x:{ticks:{color:dTickColor,maxRotation:45},grid:{display:false}},y:{grid:{color:dGridColor},ticks:{color:dTickColor,callback:v=>'$'+v.toLocaleString()}}}}});
}

function dashBuildTicker(trades){
  const can=$('dp-c-ticker');if(!can||typeof Chart==='undefined')return;
  const m={};trades.forEach(t=>{m[t.ticker]=(m[t.ticker]||0)+(t.pnl||0);});
  const sorted=Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,14);
  const labels=sorted.map(e=>e[0]),data=sorted.map(e=>+e[1].toFixed(2));
  if(dashCharts.ticker)dashCharts.ticker.destroy();
  dashCharts.ticker=new Chart(can,{type:'bar',data:{labels,datasets:[{data,backgroundColor:data.map(v=>v>=0?'rgba(74,222,128,0.65)':'rgba(248,113,113,0.65)'),borderRadius:3}]},options:{...dpBaseOpts,indexAxis:'y',scales:{x:{grid:{color:dGridColor},ticks:{color:dTickColor,callback:v=>'$'+v.toLocaleString()}},y:{ticks:{color:dTickColor},grid:{display:false}}}}});
}

function dashBuildDir(trades){
  const can=$('dp-c-dir');if(!can||typeof Chart==='undefined')return;
  const dirs=['BUY','SHORT'];
  if(dashCharts.dir)dashCharts.dir.destroy();
  let datasets,yCallback,stacked;
  if(dashDirMode==='count'){
    stacked=true;yCallback=v=>v;
    datasets=[{label:'WIN',backgroundColor:'rgba(74,222,128,0.7)',data:dirs.map(d=>trades.filter(t=>t.direction===d&&t.outcome==='WIN').length)},{label:'LOSS',backgroundColor:'rgba(248,113,113,0.7)',data:dirs.map(d=>trades.filter(t=>t.direction===d&&t.outcome==='LOSS').length)},{label:'BREAK EVEN',backgroundColor:'rgba(148,163,184,0.35)',data:dirs.map(d=>trades.filter(t=>t.direction===d&&t.outcome==='BREAK_EVEN').length)}];
  }else{
    stacked=false;yCallback=v=>'$'+v.toLocaleString();
    const sumPnl=(d,oc)=>+trades.filter(t=>t.direction===d&&t.outcome===oc).reduce((s,t)=>s+(t.pnl||0),0).toFixed(2);
    datasets=[{label:'WIN P&L',backgroundColor:'rgba(74,222,128,0.7)',data:dirs.map(d=>sumPnl(d,'WIN')),borderRadius:4},{label:'LOSS P&L',backgroundColor:'rgba(248,113,113,0.7)',data:dirs.map(d=>sumPnl(d,'LOSS')),borderRadius:4}];
  }
  dashCharts.dir=new Chart(can,{type:'bar',data:{labels:dirs,datasets},options:{...dpBaseOpts,plugins:{legend:{display:true,labels:{color:dTickColor,boxWidth:12,font:{size:11}}}},scales:{x:{stacked,ticks:{color:dTickColor},grid:{display:false}},y:{stacked,grid:{color:dGridColor},ticks:{color:dTickColor,callback:yCallback}}}}});
}

const DASH_COLS=[
  {key:'ticker',label:'Ticker'},{key:'direction',label:'Dir'},{key:'shares',label:'Shares'},
  {key:'entry_price',label:'Entry'},{key:'exit_price',label:'Exit'},{key:'pnl',label:'P&L'},
  {key:'pnl_pct',label:'P&L %'},{key:'outcome',label:'Outcome'},{key:'exit_date',label:'Date'},
  {key:'sector',label:'Sector'},{key:'_fills',label:'Fills'},
];

function dashRenderTable(trades){
  const rows=[...trades].sort((a,b)=>{
    let av=a[dashSortKey],bv=b[dashSortKey];
    if(av==null)return dashSortDir;if(bv==null)return -dashSortDir;
    return typeof av==='string'?av.localeCompare(bv)*dashSortDir:(av-bv)*dashSortDir;
  });
  const totalFills=rows.reduce((s,t)=>s+(t._fills||1),0);
  $('dp-t-count')&&($('dp-t-count').textContent=totalFills!==rows.length?`${rows.length} trade${rows.length!==1?'s':''} · ${totalFills} fills`:`${rows.length} trade${rows.length!==1?'s':''}`);
  if(!rows.length){$('dp-t-body')&&($('dp-t-body').innerHTML='<div style="padding:32px;text-align:center;color:var(--muted)">No trades match the current filters.</div>');return;}
  let h='<table class="dt"><thead><tr>';
  DASH_COLS.forEach(c=>{
    const cls=dashSortKey===c.key?(dashSortDir>0?'asc':'desc'):'';
    h+=`<th class="${cls}" style="cursor:pointer;user-select:none" onclick="dashSetSort('${c.key}')">${c.label}</th>`;
  });
  h+='</tr></thead><tbody>';
  rows.forEach(t=>{
    const pnl=t.pnl||0;
    const dirCls=t.direction==='BUY'?'b-buy':'b-short';
    const outCls=t.outcome==='WIN'?'b-win':t.outcome==='LOSS'?'b-loss':'b-neutral';
    const fillsCell=(t._fills||1)>1?`<td style="text-align:center;color:var(--dim);font-size:11px">×${t._fills}</td>`:`<td style="text-align:center;color:var(--muted);font-size:11px">—</td>`;
    h+=`<tr>
      <td><strong class="tm">${esc(t.ticker||'—')}</strong></td>
      <td><span class="badge ${dirCls}">${esc(t.direction||'—')}</span></td>
      <td class="num">${t.shares!=null?(+t.shares).toLocaleString():'—'}</td>
      <td class="num">${t.entry_price!=null?'$'+(+t.entry_price).toFixed(2):'—'}</td>
      <td class="num">${t.exit_price!=null?'$'+(+t.exit_price).toFixed(2):'—'}</td>
      <td class="num ${dcc(pnl)}">${dm(pnl)}</td>
      <td class="num ${dcc(pnl)}">${dp(t.pnl_pct)}</td>
      <td><span class="badge ${outCls}">${esc(t.outcome||'—')}</span></td>
      <td style="color:var(--dim)">${esc(t.exit_date||'—')}</td>
      <td style="color:var(--dim);font-size:11.5px">${esc(t.sector||'—')}</td>
      ${fillsCell}
    </tr>`;
  });
  h+='</tbody></table>';
  $('dp-t-body')&&($('dp-t-body').innerHTML=h);
}

function dashSetSort(key){
  dashSortDir=dashSortKey===key?dashSortDir*-1:(key==='exit_date'?-1:1);
  dashSortKey=key;dashRenderTable(dashGetDisplay());
}
function dashSetAvgMode(mode){
  dashAvgMode=mode;
  $('dp-btn-arith')&&$('dp-btn-arith').classList.toggle('active',mode==='arith');
  $('dp-btn-wtd')&&$('dp-btn-wtd').classList.toggle('active',mode==='weighted');

function dashSetDirMode(mode){

  $('dp-btn-dir-value')&&$('dp-btn-dir-value').classList.toggle('active',mode==='value');

}
